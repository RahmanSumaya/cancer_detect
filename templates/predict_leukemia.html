<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leukemia Assessment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10 mb-5">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Leukemia Diagnostic Assessment Panel</h4>
                        <a href="/" class="btn btn-sm btn-outline-light">Back to Home</a>
                    </div>
                    <div class="card-body">
                        {% if result %}
                            <div class="alert alert-danger text-center">
                                <h5>{{ result }}</h5>
                            </div>
                        {% endif %}

                        <form method="POST">
                            <h5 class="text-secondary border-bottom pb-2">Continuous Lab Metrics</h5>
                            <div class="row mb-4">
                                <div class="col-md-3 mb-3"><label class="form-label">Age</label><input type="number" step="1" name="Age" class="form-control" required></div>
                                <div class="col-md-3 mb-3"><label class="form-label">BMI</label><input type="number" step="any" name="BMI" class="form-control" required></div>
                                <div class="col-md-3 mb-3"><label class="form-label">WBC Count</label><input type="number" step="any" name="WBC_Count" class="form-control" required></div>
                                <div class="col-md-3 mb-3"><label class="form-label">RBC Count</label><input type="number" step="any" name="RBC_Count" class="form-control" required></div>
                                <div class="col-md-4 mb-3"><label class="form-label">Platelet Count</label><input type="number" step="any" name="Platelet_Count" class="form-control" required></div>
                                <div class="col-md-4 mb-3"><label class="form-label">Hemoglobin Level</label><input type="number" step="any" name="Hemoglobin_Level" class="form-control" required></div>
                                <div class="col-md-4 mb-3"><label class="form-label">Bone Marrow Blasts (%)</label><input type="number" step="any" name="Bone_Marrow_Blasts" class="form-control" required></div>
                            </div>

                            <h5 class="text-secondary border-bottom pb-2">Demographic & Background Indicators</h5>
                            <div class="row mb-4">
                                <div class="col-md-3 mb-3"><label class="form-label">Country</label><input type="text" name="Country" class="form-control" placeholder="e.g. USA" required></div>
                                <div class="col-md-3 mb-3"><label class="form-label">Ethnicity</label><input type="text" name="Ethnicity" class="form-control" placeholder="e.g. Caucasian" required></div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Socioeconomic Status</label>
                                    <select name="Socioeconomic_Status" class="form-select" required>
                                        <option value="Low">Low</option>
                                        <option value="Medium">Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Urban / Rural</label>
                                    <select name="Urban_Rural" class="form-select" required>
                                        <option value="Urban">Urban</option>
                                        <option value="Rural">Rural</option>
                                    </select>
                                </div>
                            </div>

                            <h5 class="text-secondary border-bottom pb-2">Clinical History & Exposure Flags</h5>
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Gender</label>
                                    <select name="Gender" class="form-select" required>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Genetic Mutation</label>
                                    <select name="Genetic_Mutation" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Family History</label>
                                    <select name="Family_History" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Smoking Status</label>
                                    <select name="Smoking_Status" class="form-select" required>
                                        <option value="No">Non-smoker</option>
                                        <option value="Yes">Smoker</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Alcohol Consumption</label>
                                    <select name="Alcohol_Consumption" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Radiation Exposure</label>
                                    <select name="Radiation_Exposure" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Infection History</label>
                                    <select name="Infection_History" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Chronic Illness</label>
                                    <select name="Chronic_Illness" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Immune Disorders</label>
                                    <select name="Immune_Disorders" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 mt-4 fw-bold">Compute Leukemia Assessment Matrix</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
