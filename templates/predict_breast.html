<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breast Cancer Assessment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Breast Cancer Risk Assessment Panel</h4>
                        <a href="/" class="btn btn-sm btn-outline-light">Back to Home</a>
                    </div>
                    <div class="card-body">
                        {% if result %}
                            <div class="alert alert-info font-weight-bold text-center">
                                <h5>{{ result }}</h5>
                            </div>
                        {% endif %}

                        <form method="POST">
                            <div class="row">
                                {% for field in fields %}
                                <div class="col-md-6 mb-3">
                                    <label class="form-label"><strong>{{ field }}</strong></label>
                                    <input type="number" step="any" name="{{ field }}" class="form-control" required placeholder="Enter numerical value">
                                </div>
                                {% endfor %}
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-3">Execute Prediction Pipeline</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
