<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
        }
        .assessment-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .card-header-gradient {
            background: linear-gradient(90deg, #4f46e5 0%, #06b6d4 100%);
            border-bottom: none;
            padding: 1.5rem;
        }
        .form-label {
            color: #cbd5e1;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #06b6d4;
            color: #ffffff;
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
        }
        .form-control::placeholder {
            color: #64748b;
            font-size: 0.85rem;
        }
        .btn-predict {
            background: linear-gradient(90deg, #4f46e5 0%, #06b6d4 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.6);
            opacity: 0.95;
        }
        .btn-home {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-home:hover {
            background: #ffffff;
            color: #0f172a !important;
        }
        /* Result Banner Styling */
        .result-box {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(79, 70, 229, 0.15) 100%);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 14px;
            color: #22d3ee;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-9 col-md-11">
                <div class="card assessment-card shadow-2xl">
                    
                    <div class="card-header-gradient d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 text-white d-flex align-items-center gap-2">
                            <i class="fa-solid fa-microscope text-cyan"></i> 
                            Breast Cancer Risk Assessment Panel
                        </h4>
                        <a href="/" class="btn btn-sm btn-home text-white d-flex align-items-center gap-1">
                            <i class="fa-solid fa-house"></i> Back to Home
                        </a>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        
                        {% if result %}
                            <div class="result-box p-4 mb-4 text-center shadow-inner animate__animated animate__fadeIn">
                                <h5 class="mb-0 fw-bold">
                                    <i class="fa-solid fa-square-poll-vertical me-2"></i> 
                                    Analysis Result: {{ result }}
                                </h5>
                            </div>
                        {% endif %}

                        <form method="POST">
                            <div class="row g-4">
                                {% for field in fields %}
                                <div class="col-md-6">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        {{ field }}
                                    </label>
                                    <input type="number" 
                                           step="any" 
                                           name="{{ field }}" 
                                           class="form-control" 
                                           required 
                                           placeholder="Enter numerical value">
                                </div>
                                {% endfor %}
                            </div>
                            
                            <div class="text-center mt-5">
                                <button type="submit" class="btn btn-predict w-100 d-flex align-items-center justify-content-center gap-2">
                                    <i class="fa-solid fa-gears"></i> Execute Prediction Pipeline
                                </button>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
