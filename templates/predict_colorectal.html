<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorectal Risk Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
        }
        .assessment-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .card-header-gradient {
            background: linear-gradient(90deg, #4f46e5 0%, #06b6d4 100%);
            border-bottom: none;
            padding: 1.5rem;
        }
        .section-title {
            color: #38bdf8;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .form-label {
            color: #cbd5e1;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .form-control, .form-select {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: #06b6d4;
            color: #ffffff;
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
        }
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23cbd5e1' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 16px 12px;
            padding-right: 2.5rem;
        }
        .form-select option {
            background-color: #1e293b;
            color: #ffffff;
        }
        .form-control::placeholder {
            color: #64748b;
            font-size: 0.85rem;
        }
        .btn-predict {
            background: linear-gradient(90deg, #4f46e5 0%, #06b6d4 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.6);
            opacity: 0.95;
        }
        .btn-home {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-home:hover {
            background: #ffffff;
            color: #0f172a !important;
        }
        .result-box {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(79, 70, 229, 0.15) 100%);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 14px;
            color: #22d3ee;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-md-11">
                <div class="card assessment-card shadow-2xl">
                    
                    <div class="card-header-gradient d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 text-white d-flex align-items-center gap-2">
                            <i class="fa-solid fa-stethoscope text-cyan"></i> 
                            Colorectal Cancer Risk Assessment Panel
                        </h4>
                        <a href="/" class="btn btn-sm btn-home text-white d-flex align-items-center gap-1">
                            <i class="fa-solid fa-house"></i> Back to Home
                        </a>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        
                        {% if result %}
                            <div class="result-box p-4 mb-5 text-center shadow-inner animate__animated animate__fadeIn">
                                <h5 class="mb-0 fw-bold">
                                    <i class="fa-solid fa-square-poll-vertical me-2"></i> 
                                    Analysis Result: {{ result }}
                                </h5>
                            </div>
                        {% endif %}

                        <form method="POST">
                            <!-- Demographics & History -->
                            <h5 class="section-title border-bottom border-secondary border-opacity-25 pb-2 mb-4">
                                <i class="fa-solid fa-user-circle me-2"></i>Demographics & History
                            </h5>
                            
                            <div class="row g-4 mb-5">
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Age
                                    </label>
                                    <input type="number" step="1" name="Age" class="form-control" required placeholder="Years">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        BMI
                                    </label>
                                    <input type="number" step="any" name="BMI" class="form-control" required placeholder="e.g., 22.4">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Gender
                                    </label>
                                    <select name="Gender" class="form-select" required>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Lifestyle Status
                                    </label>
                                    <select name="Lifestyle" class="form-select" required>
                                        <option value="Moderate Exercise">Moderate Exercise</option>
                                        <option value="Sedentary">Sedentary</option>
                                        <option value="Smoker">Smoker</option>
                                        <option value="Active">Active</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Ethnicity
                                    </label>
                                    <select name="Ethnicity" class="form-select" required>
                                        <option value="Caucasian">Caucasian</option>
                                        <option value="African American">African American</option>
                                        <option value="Hispanic">Hispanic</option>
                                        <option value="Asian">Asian</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Family History of CRC
                                    </label>
                                    <select name="Family_History_CRC" class="form-select" required>
                                        <option value="No">No</option>
                                        <option value="Yes">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Pre-existing Conditions
                                    </label>
                                    <select name="Pre_existing_Conditions" class="form-select" required>
                                        <option value="Obesity">Obesity</option>
                                        <option value="Diabetes">Diabetes</option>
                                        <option value="Hypertension">Hypertension</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Nutritional & Dietary Profiles -->
                            <h5 class="section-title border-bottom border-secondary border-opacity-25 pb-2 mb-4">
                                <i class="fa-solid fa-utensils me-2"></i>Nutritional & Dietary Profiles
                            </h5>
                            
                            <div class="row g-4">
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Carbohydrates (g)
                                    </label>
                                    <input type="number" step="any" name="Carbohydrates" class="form-control" placeholder="0.0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Proteins (g)
                                    </label>
                                    <input type="number" step="any" name="Proteins" class="form-control" placeholder="0.0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Fats (g)
                                    </label>
                                    <input type="number" step="any" name="Fats" class="form-control" placeholder="0.0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Vitamin A (IU)
                                    </label>
                                    <input type="number" step="any" name="Vitamin_A" class="form-control" placeholder="0.0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Vitamin C (mg)
                                    </label>
                                    <input type="number" step="any" name="Vitamin_C" class="form-control" placeholder="0.0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label d-block mb-2">
                                        <i class="fa-solid fa-circle-dot text-indigo-400 me-1" style="font-size: 0.7rem; color: #818cf8;"></i>
                                        Iron (mg)
                                    </label>
                                    <input type="number" step="any" name="Iron" class="form-control" placeholder="0.0" required>
                                </div>
                            </div>
                            
                            <div class="text-center mt-5">
                                <button type="submit" class="btn btn-predict w-100 d-flex align-items-center justify-content-center gap-2">
                                    <i class="fa-solid fa-gears"></i> Compute Colorectal Analysis Matrix
                                </button>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
